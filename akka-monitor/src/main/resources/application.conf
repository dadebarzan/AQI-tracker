akka {
  loglevel = "INFO"
  stdout-loglevel = "INFO"
  
  actor {
    provider = "local"
  }
}

akka.kafka.consumer {
  kafka-clients {
    bootstrap.servers = "kafka:29092"
    bootstrap.servers = ${?KAFKA_BROKER}
    group.id = "aqi-monitor-group"
    auto.offset.reset = "latest"
    enable.auto.commit = true
  }
  
  stop-timeout = 30s
  connection-checker {
    enable = true
    max-retries = 3
    check-interval = 15s
    backoff-factor = 2.0
  }
}

database {
  host = "postgres"
  host = ${?DB_HOST}
  port = 5432
  name = ${?DB_NAME}
  user = ${?DB_USER}
  password = ${?DB_PASS}
  
  driver = "org.postgresql.Driver"
  numThreads = 10
  maxConnections = 10
  minConnections = 5
  connectionTimeout = 30000
}

aqi-monitor {
  alert-threshold-unhealthy = 150
  alert-threshold-spike-multiplier = 1.3
  history-window-size = 10
}

http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}
  
  port = 8080
  port = ${?HTTP_PORT}

  exposed-port = 8080
  exposed-port = ${?HTTP_EXPOSED_PORT}
}